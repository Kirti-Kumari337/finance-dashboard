<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FinFlow — Finance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c18;color:#e2e8f0;font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#080c18}::-webkit-scrollbar-thumb{background:#182240;border-radius:4px}
#sidebar{width:220px;background:#0d1529;border-right:1px solid #182240;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:28px 20px 22px;border-bottom:1px solid #182240}
.logo h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#F59E0B}
.logo p{color:#4e6490;font-size:11px;margin-top:2px}
nav{padding:16px 12px;flex:1}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 16px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;background:transparent;color:#4e6490;border-left:3px solid transparent;margin-bottom:4px;text-align:left}
.nav-btn.active{background:#F59E0B18;color:#F59E0B;border-left-color:#F59E0B}
.nav-btn:hover:not(.active){background:#ffffff08;color:#e2e8f0}
.role-area{padding:16px 14px 24px;border-top:1px solid #182240}
.role-label{color:#4e6490;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
select{background:#111e38;border:1px solid #182240;color:#e2e8f0;border-radius:8px;padding:9px 14px;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;width:100%;cursor:pointer}
select option{background:#111e38}
.admin-badge{margin-top:10px;padding:7px 12px;background:#F59E0B12;border:1px solid #F59E0B33;border-radius:8px;color:#F59E0B;font-size:11px;font-weight:700;display:none}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#header{padding:18px 32px;border-bottom:1px solid #182240;display:flex;align-items:center;justify-content:space-between;background:#080c18;flex-shrink:0}
#header h2{font-family:'Syne',sans-serif;font-weight:800;font-size:22px}
#header p{color:#4e6490;font-size:12px;margin-top:2px}
#add-btn{padding:10px 22px;background:linear-gradient(135deg,#F59E0B,#D97706);border:none;border-radius:10px;color:#080c18;cursor:pointer;font-weight:700;font-size:14px;font-family:'DM Sans',sans-serif;display:none}
#content{flex:1;overflow-y:auto;padding:28px 32px}
.card{background:#0d1529;border:1px solid #182240;border-radius:18px;padding:24px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
.grid2{display:grid;grid-template-columns:3fr 2fr;gap:20px;margin-bottom:24px}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.sec-sub{color:#4e6490;font-size:12px;margin-bottom:20px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.mono{font-family:'JetBrains Mono',monospace}
.th{color:#4e6490;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 8px}
.td{padding:0 8px;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-count{color:#4e6490;font-size:12px;margin-top:14px}
.empty{text-align:center;padding:56px 0;color:#4e6490}
.recent-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #182240}
.filter-input{background:#111e38;border:1px solid #182240;color:#e2e8f0;border-radius:8px;padding:9px 14px;font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100}
.modal-box{background:#0d1529;border:1px solid #182240;border-radius:20px;padding:32px;width:90%;max-width:460px}
.field{margin-bottom:16px}
.field-label{color:#4e6490;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px}
.field input,.field select{background:#111e38;border:1px solid #182240;color:#e2e8f0;border-radius:8px;padding:10px 14px;width:100%;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;color-scheme:dark}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-cancel{flex:1;padding:13px;background:#111e38;border:none;border-radius:10px;color:#4e6490;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600}
.btn-save{flex:1;padding:13px;background:linear-gradient(135deg,#F59E0B,#D97706);border:none;border-radius:10px;color:#0a0f1e;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700}
.edit-btn{padding:4px 12px;background:#60A5FA22;border:1px solid #60A5FA44;border-radius:6px;color:#60A5FA;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;margin-right:6px}
.del-btn{padding:4px 12px;background:#EF444422;border:1px solid #EF444444;border-radius:6px;color:#EF4444;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600}
</style>
</head>
<body>
<div id="sidebar">
  <div class="logo"><h1>FinFlow</h1><p>PERSONAL FINANCE</p></div>
  <nav>
    <button class="nav-btn active" onclick="switchTab('dashboard',this)">⊞ &nbsp;Dashboard</button>
    <button class="nav-btn" onclick="switchTab('transactions',this)">⇌ &nbsp;Transactions</button>
    <button class="nav-btn" onclick="switchTab('insights',this)">◈ &nbsp;Insights</button>
  </nav>
  <div class="role-area">
    <div class="role-label">Switch Role</div>
    <select onchange="switchRole(this.value)">
      <option value="viewer">👁  Viewer</option>
      <option value="admin">⚡  Admin</option>
    </select>
    <div class="admin-badge" id="admin-badge">⚡ ADMIN MODE ACTIVE</div>
  </div>
</div>
<div id="main">
  <div id="header">
    <div><h2 id="page-title">Dashboard</h2><p id="page-date"></p></div>
    <button id="add-btn" onclick="openModal()">+ Add Transaction</button>
  </div>
  <div id="content"></div>
</div>
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px">
      <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px" id="modal-title">New Transaction</span>
      <button onclick="closeModal()" style="background:none;border:none;color:#4e6490;cursor:pointer;font-size:22px">✕</button>
    </div>
    <div class="field"><label class="field-label">Description</label><input id="f-desc" placeholder="e.g. Monthly Salary"/></div>
    <div class="row2">
      <div class="field"><label class="field-label">Amount (₹)</label><input id="f-amt" type="number" min="0" placeholder="0"/></div>
      <div class="field"><label class="field-label">Date</label><input id="f-date" type="date"/></div>
    </div>
    <div class="row2">
      <div class="field"><label class="field-label">Type</label><select id="f-type"><option value="income">Income</option><option value="expense">Expense</option></select></div>
      <div class="field"><label class="field-label">Category</label><select id="f-cat"><option>Salary</option><option>Freelance</option><option>Investment</option><option>Food</option><option>Transport</option><option>Shopping</option><option>Entertainment</option><option>Healthcare</option><option>Utilities</option></select></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:28px">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveModal()">Add Transaction</button>
    </div>
  </div>
</div>
<script>
const CC={Food:"#F59E0B",Transport:"#3B82F6",Shopping:"#8B5CF6",Entertainment:"#EC4899",Healthcare:"#10B981",Utilities:"#F97316",Salary:"#06B6D4",Freelance:"#84CC16",Investment:"#6366F1"};
const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let uid=200,editId=null,role="viewer",tab="dashboard",srch="",fT="all",fC="all",srt="date-desc";
let TX=[
  {id:uid++,date:"2026-01-03",description:"Monthly Salary",amount:85000,category:"Salary",type:"income"},
  {id:uid++,date:"2026-01-05",description:"Grocery Store",amount:2800,category:"Food",type:"expense"},
  {id:uid++,date:"2026-01-07",description:"Uber Rides",amount:650,category:"Transport",type:"expense"},
  {id:uid++,date:"2026-01-10",description:"Netflix Subscription",amount:649,category:"Entertainment",type:"expense"},
  {id:uid++,date:"2026-01-12",description:"Electricity Bill",amount:1800,category:"Utilities",type:"expense"},
  {id:uid++,date:"2026-01-18",description:"Restaurant Dinner",amount:1200,category:"Food",type:"expense"},
  {id:uid++,date:"2026-01-20",description:"Freelance UI Project",amount:25000,category:"Freelance",type:"income"},
  {id:uid++,date:"2026-01-25",description:"Pharmacy",amount:1100,category:"Healthcare",type:"expense"},
  {id:uid++,date:"2026-02-01",description:"Monthly Salary",amount:85000,category:"Salary",type:"income"},
  {id:uid++,date:"2026-02-03",description:"Supermarket",amount:3100,category:"Food",type:"expense"},
  {id:uid++,date:"2026-02-06",description:"Metro Pass",amount:800,category:"Transport",type:"expense"},
  {id:uid++,date:"2026-02-09",description:"Amazon Shopping",amount:4500,category:"Shopping",type:"expense"},
  {id:uid++,date:"2026-02-14",description:"Valentine Dinner",amount:2200,category:"Food",type:"expense"},
  {id:uid++,date:"2026-02-16",description:"Doctor Consultation",amount:1500,category:"Healthcare",type:"expense"},
  {id:uid++,date:"2026-02-20",description:"Freelance Design Work",amount:18000,category:"Freelance",type:"income"},
  {id:uid++,date:"2026-02-25",description:"Internet Bill",amount:1000,category:"Utilities",type:"expense"},
  {id:uid++,date:"2026-03-01",description:"Monthly Salary",amount:85000,category:"Salary",type:"income"},
  {id:uid++,date:"2026-03-04",description:"Grocery Shopping",amount:2600,category:"Food",type:"expense"},
  {id:uid++,date:"2026-03-08",description:"Clothing Store",amount:5800,category:"Shopping",type:"expense"},
  {id:uid++,date:"2026-03-11",description:"Cab Service",amount:900,category:"Transport",type:"expense"},
  {id:uid++,date:"2026-03-15",description:"Movie Tickets",amount:800,category:"Entertainment",type:"expense"},
  {id:uid++,date:"2026-03-18",description:"Gym Membership",amount:2500,category:"Healthcare",type:"expense"},
  {id:uid++,date:"2026-03-22",description:"Freelance API Project",amount:30000,category:"Freelance",type:"income"},
  {id:uid++,date:"2026-03-28",description:"Electricity Bill",amount:1900,category:"Utilities",type:"expense"},
  {id:uid++,date:"2026-04-01",description:"Monthly Salary",amount:85000,category:"Salary",type:"income"},
  {id:uid++,date:"2026-04-03",description:"Grocery Store",amount:2900,category:"Food",type:"expense"},
  {id:uid++,date:"2026-04-07",description:"Uber",amount:450,category:"Transport",type:"expense"},
  {id:uid++,date:"2026-04-10",description:"Online Course",amount:3000,category:"Shopping",type:"expense"},
  {id:uid++,date:"2026-04-14",description:"Restaurant",amount:1800,category:"Food",type:"expense"},
];
const fmt=n=>n>=100000?`₹${(n/100000).toFixed(1)}L`:n>=1000?`₹${(n/1000).toFixed(1)}K`:`₹${n}`;
const fmtD=d=>new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"});
const inc=()=>TX.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
const exp=()=>TX.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
const isAdm=()=>role==="admin";

function switchRole(r){role=r;document.getElementById("admin-badge").style.display=r==="admin"?"block":"none";document.getElementById("add-btn").style.display=(r==="admin"&&tab==="transactions")?"block":"none";render();}
function switchTab(t,btn){tab=t;document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");document.getElementById("page-title").textContent=t.charAt(0).toUpperCase()+t.slice(1);document.getElementById("add-btn").style.display=(isAdm()&&t==="transactions")?"block":"none";render();}
function openModal(id=null){editId=id;const tx=id?TX.find(t=>t.id===id):null;document.getElementById("modal-title").textContent=id?"Edit Transaction":"New Transaction";document.getElementById("save-btn").textContent=id?"Save Changes":"Add Transaction";document.getElementById("f-desc").value=tx?tx.description:"";document.getElementById("f-amt").value=tx?tx.amount:"";document.getElementById("f-date").value=tx?tx.date:new Date().toISOString().split("T")[0];document.getElementById("f-type").value=tx?tx.type:"income";document.getElementById("f-cat").value=tx?tx.category:"Salary";document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";editId=null;}
function saveModal(){const desc=document.getElementById("f-desc").value.trim(),amt=parseFloat(document.getElementById("f-amt").value),date=document.getElementById("f-date").value,type=document.getElementById("f-type").value,cat=document.getElementById("f-cat").value;if(!desc||!amt||!date)return;if(editId){TX=TX.map(t=>t.id===editId?{...t,description:desc,amount:amt,date,type,category:cat}:t);}else{TX.push({id:uid++,description:desc,amount:amt,date,type,category:cat});}closeModal();render();}
function delTx(id){TX=TX.filter(t=>t.id!==id);render();}

function mData(){const m={};TX.forEach(t=>{const d=new Date(t.date),k=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}`;if(!m[k])m[k]={label:MN[d.getMonth()],income:0,expense:0};m[k][t.type]+=t.amount;});return Object.entries(m).sort(([a],[b])=>a.localeCompare(b)).map(([,v])=>v);}
function cats(){const m={};TX.filter(t=>t.type==="expense").forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);}

function barChart(data){
  const mx=Math.max(...data.map(d=>Math.max(d.income,d.expense)),1);
  return`<div style="display:flex;align-items:flex-end;gap:6px;height:160px;margin-top:8px">${data.map(d=>`<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;height:100%;justify-content:flex-end"><div style="display:flex;gap:2px;align-items:flex-end;width:100%"><div style="flex:1;background:#10B981;border-radius:4px 4px 0 0;height:${Math.max(2,Math.round(d.income/mx*140))}px" title="${fmt(d.income)}"></div><div style="flex:1;background:#EF4444;border-radius:4px 4px 0 0;height:${Math.max(2,Math.round(d.expense/mx*140))}px" title="${fmt(d.expense)}"></div></div><span style="color:#4e6490;font-size:10px">${d.label}</span></div>`).join("")}</div><div style="display:flex;gap:16px;margin-top:10px"><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:#10B981"></div><span style="color:#4e6490;font-size:12px">Income</span></div><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:#EF4444"></div><span style="color:#4e6490;font-size:12px">Expense</span></div></div>`;
}

function donut(cs){
  if(!cs.length)return`<div style="width:110px;height:110px;border-radius:50%;background:#182240;flex-shrink:0"></div>`;
  const tot=cs.reduce((s,c)=>s+c.value,0),r=40,circ=2*Math.PI*r;let off=0;
  const sl=cs.map(c=>{const dash=(c.value/tot)*circ,s=`<circle cx="55" cy="55" r="${r}" fill="none" stroke="${CC[c.name]||"#64748b"}" stroke-width="14" stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 55 55)"/>`;off+=dash;return s;});
  return`<svg viewBox="0 0 110 110" style="width:110px;height:110px;flex-shrink:0">${sl.join("")}</svg>`;
}

function render(){
  const c=document.getElementById("content");
  if(tab==="dashboard")c.innerHTML=dash();
  else if(tab==="transactions")c.innerHTML=txs();
  else c.innerHTML=insights();
}

function dash(){
  const i=inc(),e=exp(),b=i-e,cs=cats(),md=mData();
  const recent=[...TX].sort((a,b2)=>new Date(b2.date)-new Date(a.date)).slice(0,6);
  return`<div class="grid3">${[{label:"Total Balance",val:b,color:"#F59E0B",icon:"◎",sub:"Net savings so far",pct:100},{label:"Total Income",val:i,color:"#10B981",icon:"↑",sub:`${TX.filter(t=>t.type==="income").length} income entries`,pct:100},{label:"Total Expenses",val:e,color:"#EF4444",icon:"↓",sub:`${TX.filter(t=>t.type==="expense").length} expense entries`,pct:i>0?Math.min(100,Math.round(e/i*100)):0}].map(c=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="color:#4e6490;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">${c.label}</div><div class="mono" style="font-size:30px;font-weight:500;color:${c.color};margin:10px 0 5px">${fmt(Math.abs(c.val))}</div><div style="color:#4e6490;font-size:12px">${c.sub}</div></div><div style="width:46px;height:46px;border-radius:14px;background:${c.color}18;display:flex;align-items:center;justify-content:center;font-size:22px;color:${c.color}">${c.icon}</div></div><div style="margin-top:18px;height:3px;background:#182240;border-radius:2px"><div style="height:100%;background:${c.color};border-radius:2px;width:${c.pct}%"></div></div></div>`).join("")}</div>
  <div class="grid2"><div class="card"><div class="sec-title">Cash Flow Trend</div><div class="sec-sub">Monthly income vs expenses</div>${barChart(md)}</div><div class="card"><div class="sec-title">Spending Breakdown</div><div class="sec-sub">Expenses by category</div><div style="display:flex;gap:16px;align-items:center;margin-top:8px">${donut(cs)}<div style="display:flex;flex-direction:column;gap:10px;flex:1">${cs.slice(0,4).map(c=>`<div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:2px;background:${CC[c.name]||"#64748b"}"></div><span style="color:#4e6490;font-size:13px">${c.name}</span></div><span class="mono" style="color:#e2e8f0;font-size:13px">${fmt(c.value)}</span></div>`).join("")}</div></div></div></div>
  <div class="card"><div class="sec-title" style="margin-bottom:20px">Recent Activity</div>${recent.map(t=>`<div class="recent-row"><div style="display:flex;align-items:center"><div style="width:38px;height:38px;border-radius:10px;background:${CC[t.category]||"#64748b"}22;display:flex;align-items:center;justify-content:center;font-size:16px;color:${CC[t.category]||"#64748b"};margin-right:14px">${t.type==="income"?"↑":"↓"}</div><div><div style="font-size:14px;font-weight:500">${t.description}</div><div style="color:#4e6490;font-size:12px">${t.category} · ${fmtD(t.date)}</div></div></div><div class="mono" style="font-size:15px;font-weight:500;color:${t.type==="income"?"#10B981":"#EF4444"}">${t.type==="income"?"+":"-"}${fmt(t.amount)}</div></div>`).join("")}</div>`;
}

function txs(){
  let list=[...TX];
  if(srch)list=list.filter(t=>`${t.description} ${t.category}`.toLowerCase().includes(srch.toLowerCase()));
  if(fT!=="all")list=list.filter(t=>t.type===fT);
  if(fC!=="all")list=list.filter(t=>t.category===fC);
  if(srt==="date-desc")list.sort((a,b)=>new Date(b.date)-new Date(a.date));
  else if(srt==="date-asc")list.sort((a,b)=>new Date(a.date)-new Date(b.date));
  else if(srt==="amt-desc")list.sort((a,b)=>b.amount-a.amount);
  else list.sort((a,b)=>a.amount-b.amount);
  const adm=isAdm();
  const cols=adm?"110px 1fr 120px 90px 100px 110px":"110px 1fr 120px 90px 100px";
  const hs=["Date","Description","Category","Type","Amount",...(adm?["Actions"]:[])];
  const allC=["all","Salary","Freelance","Investment","Food","Transport","Shopping","Entertainment","Healthcare","Utilities"];
  return`<div class="card" style="padding:18px 24px;margin-bottom:20px"><div style="display:grid;grid-template-columns:1fr auto auto auto;gap:12px"><input class="filter-input" placeholder="🔍 Search..." value="${srch}" oninput="srch=this.value;render()" style="width:100%"/><select class="filter-input" onchange="fT=this.value;render()">${["all","income","expense"].map(v=>`<option value="${v}"${fT===v?" selected":""}>${v==="all"?"All Types":v.charAt(0).toUpperCase()+v.slice(1)}</option>`).join("")}</select><select class="filter-input" onchange="fC=this.value;render()">${allC.map(c=>`<option value="${c}"${fC===c?" selected":""}>${c==="all"?"All Categories":c}</option>`).join("")}</select><select class="filter-input" onchange="srt=this.value;render()"><option value="date-desc"${srt==="date-desc"?" selected":""}>Newest First</option><option value="date-asc"${srt==="date-asc"?" selected":""}>Oldest First</option><option value="amt-desc"${srt==="amt-desc"?" selected":""}>Highest Amount</option><option value="amt-asc"${srt==="amt-asc"?" selected":""}>Lowest Amount</option></select></div></div>
  <div class="card"><div style="display:grid;grid-template-columns:${cols};padding:0 0 12px;border-bottom:1px solid #182240;margin-bottom:4px">${hs.map(h=>`<div class="th">${h}</div>`).join("")}</div>${list.length===0?`<div class="empty"><div style="font-size:36px;margin-bottom:12px">🔍</div><div style="font-weight:600;font-size:16px;color:#e2e8f0">No transactions found</div><div style="font-size:13px;margin-top:6px">Try adjusting filters</div></div>`:list.map(t=>`<div style="display:grid;grid-template-columns:${cols};padding:13px 0;border-bottom:1px solid #18224022;align-items:center" onmouseover="this.style.background='#ffffff05'" onmouseout="this.style.background='transparent'"><div class="td mono" style="color:#4e6490;font-size:12px">${fmtD(t.date)}</div><div class="td">${t.description}</div><div class="td"><span class="badge" style="background:${CC[t.category]||"#64748b"}22;color:${CC[t.category]||"#64748b"}">${t.category}</span></div><div class="td"><span class="badge" style="background:${t.type==="income"?"#10B98122":"#EF444422"};color:${t.type==="income"?"#10B981":"#EF4444"}">${t.type}</span></div><div class="td mono" style="font-size:14px;font-weight:500;color:${t.type==="income"?"#10B981":"#EF4444"}">${t.type==="income"?"+":"-"}${fmt(t.amount)}</div>${adm?`<div class="td"><button class="edit-btn" onclick="openModal(${t.id})">Edit</button><button class="del-btn" onclick="delTx(${t.id})">Del</button></div>`:""}</div>`).join("")}<div class="tx-count">Showing ${list.length} of ${TX.length} transactions</div></div>`;
}

function insights(){
  const i=inc(),e=exp(),b=i-e,rate=i>0?((b/i)*100).toFixed(1):"0.0",cs=cats(),md=mData();
  const ms=[...new Set(TX.map(t=>t.date.slice(0,7)))].sort().reverse();
  const thisM=TX.filter(t=>t.type==="expense"&&t.date.startsWith(ms[0]||"")).reduce((s,t)=>s+t.amount,0);
  const lastM=TX.filter(t=>t.type==="expense"&&t.date.startsWith(ms[1]||"")).reduce((s,t)=>s+t.amount,0);
  const rn=parseFloat(rate),rc=rn>=20?"#10B981":rn>=10?"#F59E0B":"#EF4444";
  return`<div class="grid3" style="margin-bottom:24px">${[
    {icon:"🏆",label:"Top Spending Category",val:cs[0]?.name||"—",sub:cs[0]?fmt(cs[0].value)+" total":"No data",color:CC[cs[0]?.name]||"#F59E0B"},
    {icon:"📅",label:"This Month Expenses",val:fmt(thisM),sub:lastM?`${thisM<=lastM?"↓ Less":"↑ More"} than last month (${fmt(lastM)})`:"First recorded month",color:thisM<=lastM?"#10B981":"#EF4444"},
    {icon:"💰",label:"Savings Rate",val:`${rate}%`,sub:rn>=20?"Great savings habit! 🎉":rn>=10?"Decent, aim for 20%+":"Consider reducing expenses",color:rc}
  ].map(c=>`<div class="card" style="display:flex;align-items:center;gap:16px"><div style="font-size:34px">${c.icon}</div><div><div style="color:#4e6490;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">${c.label}</div><div class="mono" style="font-size:22px;font-weight:500;color:${c.color};margin-top:6px">${c.val}</div><div style="color:#4e6490;font-size:12px;margin-top:4px">${c.sub}</div></div></div>`).join("")}</div>
  <div class="card" style="margin-bottom:24px"><div class="sec-title">Monthly Comparison</div><div class="sec-sub">Income vs expenses by month</div>${barChart(md)}</div>
  <div class="card"><div class="sec-title" style="margin-bottom:22px">Spending Breakdown by Category</div>${cs.length===0?`<div style="color:#4e6490;text-align:center;padding:32px 0">No expense data</div>`:cs.map((c,i2)=>{const pct=e>0?(c.value/e*100):0;return`<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px"><span class="mono" style="color:#4e6490;font-size:11px">#${i2+1}</span><span class="badge" style="background:${CC[c.name]||"#64748b"}22;color:${CC[c.name]||"#64748b"}">${c.name}</span></div><div style="display:flex;align-items:center;gap:20px"><span style="color:#4e6490;font-size:12px">${pct.toFixed(1)}%</span><span class="mono" style="color:#e2e8f0;font-size:14px;font-weight:500;min-width:72px;text-align:right">${fmt(c.value)}</span></div></div><div style="height:6px;background:#182240;border-radius:3px"><div style="height:100%;background:${CC[c.name]||"#64748b"};border-radius:3px;width:${pct.toFixed(1)}%"></div></div></div>`;}).join("")}</div>`;
}

document.getElementById("page-date").textContent=new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
render();
</script>
</body>
</html>
